name: Deploy Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build packages and web app
        run: npm run build -w @portfolio-margin/core -w @portfolio-margin/market-data -w web --if-present
        env:
          GITHUB_ACTIONS: true

      - name: Publish build to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: apps/web/dist
          clean: true
          single-commit: true
