name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Build packages
        run: npm run build -w @portfolio-margin/core -w @portfolio-margin/market-data -w web --if-present
      - name: Test
        run: npm run test -w @portfolio-margin/core --if-present
